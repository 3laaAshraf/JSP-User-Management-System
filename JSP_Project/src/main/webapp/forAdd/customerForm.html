<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!-- Vapor Theme -->
<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/vapor/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    /* Top Vapor Bar */
    .top-bar {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        backdrop-filter: blur(10px);
        background: rgb(18, 0, 54);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
    }
    .btn-neon {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #ff00cc, #3333ff);
        color: white;
        cursor: pointer;
        font-weight: bold;
        letter-spacing: 1px;
        transition: 0.3s ease;
        box-shadow: 0 0 10px #ff00cc;
    }

    .btn-neon:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #ff00cc, 0 0 40px #3333ff;
    }
    .logo {
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 2px;
        color: #ff00cc;
        text-shadow: 0 0 10px #ff00cc;
    }

    body {
        margin: 0;
        padding-top: 90px;
        min-height: 100vh;
        background: linear-gradient(135deg, #041c32, #0a2647);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .customer-card {
        width: 420px;
        padding: 2rem;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #00d4ff;
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.7);
        backdrop-filter: blur(10px);
        animation: slideFade 0.8s ease;
    }

    @keyframes slideFade {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-control {
        background-color: rgba(255,255,255,0.05);
        border: 1px solid #00d4ff;
        color: white;
    }

    .form-control:focus {
        border-color: #33e6ff;
        box-shadow: 0 0 12px #00d4ff;
    }

    .btn-cyan {
        width: 100%;
        font-weight: bold;
        background: linear-gradient(45deg, #00d4ff, #0096c7);
        border: none;
        box-shadow: 0 0 20px #00d4ff;
        transition: 0.3s;
    }

    .btn-cyan:hover {
        transform: scale(1.05);
        box-shadow: 0 0 35px #00f2ff;
    }

    label {
        font-weight: 500;
    }
</style>
<!-- Vapor Top Bar -->
<div class="top-bar">
    <div class="logo">Adding Panel</div>
    <button class="btn-neon" onclick="window.location.href='../home.jsp'">
        Home
    </button>
</div>
<br>
<div class="customer-card">
    <h3 class="text-center text-info mb-4">
        <i class="bi bi-person-lines-fill"></i> Add Customer
    </h3>

    <form action="AddCustomer.jsp" method="post">

        <!-- ID removed (auto increment in database) -->

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="fullName" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Country</label>
            <input type="text" class="form-control" name="country" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" name="phone" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Gender</label><br>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                <label class="form-check-label" for="male">Male</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                <label class="form-check-label" for="female">Female</label>
            </div>
        </div>
        <button type="submit" class="btn btn-cyan">
            <i class="bi bi-cloud-arrow-up-fill"></i> Save Customer
        </button>

    </form>
</div>
</body>
</html>
